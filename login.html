<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vura Astrology | Login</title>
  <link rel="shortcut icon" href="./assets/imagens/apple-touch-icon.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/menu.css">
  <link rel="stylesheet" href="./assets/css/footer.css">
  <link rel="stylesheet" href="./assets/css/login.css">
</head>

<body>
  <div id="vura-nav"></div>

  <main class="login-pagina">
    <header class="login-cabecalho">
      <h1 class="login-titulo">Meu Vura</h1>
      <p class="login-subtitulo">Acesse sua conta para salvar e acompanhar sua jornada astral.</p>
      <div class="login-divider"></div>
    </header>

    <section class="login-cartao" aria-label="Formulário de login">
      <form class="login-formulario" autocomplete="on">
        <div class="login-campo">
          <label for="email" class="login-label">E-mail</label>
          <input id="email" name="email" class="login-input" type="email" placeholder="voce@exemplo.com" required>
        </div>

        <div class="login-campo">
          <label for="password" class="login-label">Senha</label>
          <input id="password" name="password" class="login-input" type="password" placeholder="••••••••" required>
        </div>

        <div class="login-opcoes">
          <label class="login-checkbox">
            <input type="checkbox" name="remember">
            <span>Lembrar de mim</span>
          </label>
          <a href="#" class="login-link">Esqueci minha senha</a>
        </div>

        <button class="login-botao" type="submit">Entrar</button>
      </form>

      <p class="login-rodape">
        Não tem conta?
        <a href="cadastro.html" class="login-link">Criar cadastro</a>
      </p>
    </section>
  </main>

  <div id="footer-container"></div>

  <script src="./assets/js/menu.js"></script>
  <script src="./assets/js/footer.js"></script>
  <script src="./assets/js/theme.js"></script>
</body>

</html>
