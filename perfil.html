<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Perfil</title>
  <link rel="shortcut icon" href="./assets/imagens/apple-touch-icon.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/perfil.css">
  <link rel="stylesheet" href="./assets/css/menu.css">
  <link rel="stylesheet" href="./assets/css/footer.css">
</head>

<body>

  <div id="vura-nav"></div>

  <div class="conteudo">
    <h1>Editar perfil</h1>

    <div class="card">

      <!-- Avatar -->
      <div class="avatar-area">
        <div class="avatar-ring" title="Foto de perfil">
          ?
          <div class="avatar-edit-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="#060e0b" stroke-width="2.5">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
          </div>
        </div>
        <span class="avatar-name"></span>
      </div>

      <hr class="divisor">

      <!-- Nome -->
      <div class="field">
        <label for="nome">Nome</label>
        <input id="nome" type="text" placeholder="Digite seu nome" autocomplete="off">
      </div>

      <!-- Email -->
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Digite seu email">
      </div>

      <!-- Seção senha -->
      <div class="section-title">Alterar Senha <span class="section-hint">(deixe em branco para não alterar)</span></div>

      <div class="field">
        <label for="senha-atual">Senha atual</label>
        <div class="input-wrap">
          <input id="senha-atual" type="password" placeholder="••••••••">
          <button class="toggle-pass" onclick="togglePass(this)" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="nova-senha">Nova senha</label>
        <div class="input-wrap">
          <input id="nova-senha" type="password" placeholder="••••••••">
          <button class="toggle-pass" onclick="togglePass(this)" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="confirmar-senha">Confirmar nova senha</label>
        <div class="input-wrap">
          <input id="confirmar-senha" type="password" placeholder="••••••••">
          <button class="toggle-pass" onclick="togglePass(this)" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <p id="perfil-erro" class="perfil-erro"></p>

      <button class="btn-save" onclick="salvar()">Salvar alterações</button>

    </div>
  </div>

  <div id="footer-container"></div>

  <script src="./assets/js/perfil.js"></script>
  <script src="./assets/js/menu.js"></script>
  <script src="./assets/js/footer.js"></script>
  <script src="./assets/js/theme.js"></script>

</body>
</html>
