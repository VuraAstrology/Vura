<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Perfil</title>
  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/perfil.css">
  <link rel="stylesheet" href="./assets/css/menu.css">
  <link rel="stylesheet" href="./assets/css/footer.css">
  <link rel="shortcut icon" href="./assets/imagens/apple-touch-icon.png" type="image/x-icon">


  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

  <!-- Menu: apenas esta div em todas as páginas -->
  <div id="vura-nav"></div>
  <div class="conteudo">
    <h1>Editar perfil</h1>

    <div class="card">

      <!-- Avatar -->
      <div class="avatar-area">
        <div class="avatar-ring" title="Alterar foto">
          A
          <div class="avatar-edit-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="#060e0b" stroke-width="2.5">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
          </div>
        </div>
        <span class="avatar-name">Alterar foto</span>
      </div>

      <hr class="divisor">

      <!-- Nome -->
      <div class="field">
        <label for="nome">Nome</label>
        <input id="nome" type="text" placeholder="digite seu nome" autocomplete="off">
      </div>

      <!-- Email -->
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="digite seu email">
      </div>

      <!-- Gênero -->
      <div class="field">
        <label>Gênero</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="genero" value="f" checked>
            <span class="radio-dot"></span>
            Feminino
          </label>
          <label class="radio-option">
            <input type="radio" name="genero" value="m">
            <span class="radio-dot"></span>
            Masculino
          </label>
          <label class="radio-option">
            <input type="radio" name="genero" value="nb">
            <span class="radio-dot"></span>
            Não binário
          </label>
        </div>
      </div>

      <!-- Cidade -->
      <div class="field">
        <label for="cidade">Cidade</label>
        <input id="cidade" type="text" placeholder="digite sua cidade" autocomplete="off">
      </div>

      <!-- Data de nascimento -->
      <div class="field">
        <label for="nascimento">Data de nascimento</label>
        <input id="nascimento" type="date">
      </div>


      <!-- Seção senha -->
      <div class="section-title">Editar Senha</div>

      <div class="field">
        <label for="senha-atual">Senha atual</label>
        <div class="input-wrap">
          <input id="senha-atual" type="password" placeholder="••••••••">
          <button class="toggle-pass" onclick="togglePass(this)" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="nova-senha">Nova senha</label>
        <div class="input-wrap">
          <input id="nova-senha" type="password" placeholder="••••••••">
          <button class="toggle-pass" onclick="togglePass(this)" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="confirmar-senha">Confirmar senha</label>
        <div class="input-wrap">
          <input id="confirmar-senha" type="password" placeholder="••••••••">
          <button class="toggle-pass" onclick="togglePass(this)" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-save" onclick="salvar()">Salvar alterações</button>

    </div>
  </div>
  <!-- FOOTER -->
  <div id="footer-container"></div>

  <script src="./assets/js/perfil.js"></script>
  <script src="./assets/js/menu.js"></script>
  <script src="./assets/js/footer.js"></script>


</body>

</html>
